<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: cover mode fills the full iPhone screen incl. notch -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                   user-scalable=no, viewport-fit=cover" />

    <title>STOIC</title>
    <meta name="description" content="Performance & Discipline System" />

    <!-- ── iOS PWA: makes Add to Home Screen behave like a native app ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="STOIC" />

    <!-- ── Android / Chrome PWA ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#080808" />

    <!-- ── Apple touch icon (home screen icon on iOS) ── -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── Web App Manifest ── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />

    <!-- ── Google Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
